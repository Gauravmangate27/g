<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Barcode & QR Scanner</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        /* Module Card */
        .module-card {
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 1.5rem;
        }

        .field-label {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            display: block;
        }

        .scan-field-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #scannedValue {
            flex: 1;
            height: 48px;
            padding: 0 16px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Monaco', 'Consolas', monospace;
            color: #111;
            background: #fafafa;
            transition: all 0.2s;
            outline: none;
        }

        #scannedValue:focus { border-color: #4f8ef7; background: #fff; }
        #scannedValue.filled { border-color: #22c55e; background: #f0fdf4; }

        #scanBtn {
            height: 48px;
            padding: 0 20px;
            background: #4f8ef7;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s, transform 0.1s;
        }

        #scanBtn:hover { background: #3a7de0; }
        #scanBtn:active { transform: scale(0.96); }
        #scanBtn svg { width: 20px; height: 20px; }

        /* Bottom Sheet Overlay */
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }

        #overlay.open { display: flex; }

        .sheet {
            background: #fff;
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 500px;
            padding: 1.5rem;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .sheet-handle {
            width: 40px;
            height: 5px;
            background: #e0e0e0;
            border-radius: 10px;
            margin: 0 auto 1.5rem;
        }

        .sheet-title {
            font-size: 17px;
            font-weight: 700;
            color: #111;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .sheet-options {
            display: flex;
            gap: 15px;
        }

        .sheet-option {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 1.5rem;
            border: 2px solid #f0f0f0;
            border-radius: 18px;
            cursor: pointer;
            background: #fff;
            transition: all 0.2s;
        }

        .sheet-option:hover { border-color: #4f8ef7; background: #f8fbff; }
        .sheet-option svg { width: 36px; height: 36px; stroke: #4f8ef7; }
        .sheet-option span { font-size: 14px; font-weight: 600; color: #444; }

        /* Fullscreen Camera */
        #cameraView {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #cameraView.open { display: flex; }

        .cam-frame-wrap {
            position: relative;
            width: 100%;
            height: 70vh;
            overflow: hidden;
        }

        #videoEl {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cam-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
        }

        .scan-box {
            width: 260px;
            height: 260px;
            position: relative;
            box-shadow: 0 0 0 4000px rgba(0,0,0,0.5);
            border-radius: 16px;
        }

        .scan-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: #4f8ef7;
            box-shadow: 0 0 15px #4f8ef7;
            animation: sweep 2s linear infinite;
        }

        @keyframes sweep {
            0% { top: 5%; }
            50% { top: 95%; }
            100% { top: 5%; }
        }

        .corner { position: absolute; width: 24px; height: 24px; border: 4px solid #4f8ef7; }
        .tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; border-radius: 12px 0 0 0; }
        .tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; border-radius: 0 12px 0 0; }
        .bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; border-radius: 0 0 0 12px; }
        .br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; border-radius: 0 0 12px 0; }

        .cam-hint {
            color: #fff;
            font-size: 15px;
            margin: 24px 0;
            font-weight: 500;
        }

        #closeCamera {
            padding: 12px 40px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-weight: 600;
        }

        #decodeCanvas { display: none; }
        #galleryInput { display: none; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #111;
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            z-index: 3000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="module-card">
    <h2>Product Entry</h2>
    <label class="field-label">Barcode / QR Code</label>
    <div class="scan-field-row">
        <input id="scannedValue" type="text" placeholder="Scan or type code">
        <button id="scanBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
            Scan
        </button>
    </div>
</div>

<div id="overlay">
    <div class="sheet">
        <div class="sheet-handle"></div>
        <p class="sheet-title">Select Scanner Source</p>
        <div class="sheet-options">
            <button class="sheet-option" id="optCamera">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                <span>Camera</span>
            </button>
            <button class="sheet-option" id="optGallery">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                <span>Gallery</span>
            </button>
        </div>
    </div>
</div>

<div id="cameraView">
    <div class="cam-frame-wrap">
        <video id="videoEl" autoplay playsinline muted></video>
        <div class="cam-overlay">
            <div class="scan-box">
                <div class="corner tl"></div>
                <div class="corner tr"></div>
                <div class="corner bl"></div>
                <div class="corner br"></div>
            </div>
        </div>
    </div>
    <p class="cam-hint">Align code within the frame</p>
    <button id="closeCamera">Cancel</button>
</div>

<input type="file" id="galleryInput" accept="image/*">
<canvas id="decodeCanvas"></canvas>
<div id="toast"></div>

<script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>

<script>
    const scanBtn = document.getElementById('scanBtn');
    const overlay = document.getElementById('overlay');
    const optCamera = document.getElementById('optCamera');
    const optGallery = document.getElementById('optGallery');
    const cameraView = document.getElementById('cameraView');
    const videoEl = document.getElementById('videoEl');
    const closeCamera = document.getElementById('closeCamera');
    const galleryInput = document.getElementById('galleryInput');
    const canvas = document.getElementById('decodeCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const valueInput = document.getElementById('scannedValue');
    const toast = document.getElementById('toast');

    let stream = null;
    let scanning = false;
    let rafId = null;

    // Initialize Reader with specific hints for better accuracy
    const codeReader = new ZXing.MultiFormatReader();
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.QR_CODE,
        ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.UPC_A,
        ZXing.BarcodeFormat.ITF
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    codeReader.setHints(hints);

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function fillValue(text) {
        valueInput.value = text;
        valueInput.classList.add('filled');
        showToast("Scanned: " + text);
        if (navigator.vibrate) navigator.vibrate(100);
    }

    scanBtn.onclick = () => overlay.classList.add('open');
    overlay.onclick = (e) => { if(e.target === overlay) overlay.classList.remove('open'); };

    // Camera Logic
    optCamera.onclick = async () => {
        overlay.classList.remove('open');
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            videoEl.srcObject = stream;
            cameraView.classList.add('open');
            scanning = true;
            videoEl.onloadedmetadata = () => {
                videoEl.play();
                requestAnimationFrame(scanLoop);
            };
        } catch (err) {
            showToast("Camera Error: Please check permissions.");
        }
    };

    function scanLoop() {
        if (!scanning) return;
        if (videoEl.readyState === videoEl.HAVE_ENOUGH_DATA) {
            canvas.width = videoEl.videoWidth;
            canvas.height = videoEl.videoHeight;
            ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
            try {
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const lumSource = new ZXing.RGBLuminanceSource(imgData.data, canvas.width, canvas.height);
                const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lumSource));
                const result = codeReader.decode(binaryBitmap);
                if (result) {
                    fillValue(result.getText());
                    stopCamera();
                    return;
                }
            } catch (e) {}
        }
        rafId = requestAnimationFrame(scanLoop);
    }

    function stopCamera() {
        scanning = false;
        if (rafId) cancelAnimationFrame(rafId);
        if (stream) stream.getTracks().forEach(t => t.stop());
        videoEl.srcObject = null;
        cameraView.classList.remove('open');
    }

    closeCamera.onclick = stopCamera;

    // Gallery Logic
    optGallery.onclick = () => {
        overlay.classList.remove('open');
        galleryInput.click();
    };

    galleryInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const img = new Image();
        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            try {
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const lumSource = new ZXing.RGBLuminanceSource(imgData.data, canvas.width, canvas.height);
                const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lumSource));
                const result = codeReader.decode(binaryBitmap);
                fillValue(result.getText());
            } catch (err) {
                showToast("Could not find a valid code in this image.");
            }
            URL.revokeObjectURL(img.src);
        };
        img.src = URL.createObjectURL(file);
        e.target.value = '';
    };
</script>

</body>
</html>
